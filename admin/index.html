<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Upload - OKELOTRE Bukti JP</title>
  <link rel="preload" as="image" href="/assets/okelotre-logo.png" />
  <style>
    :root{--bg:#020816;--panel:rgba(2,16,38,.86);--line:rgba(58,205,255,.74);--cyan:#23c7ff;--blue:#0b7bff;--text:#f4fcff;--muted:#b7def8;--danger:#ff5b7a;--ok:#4dffb5;--shadow:0 0 24px rgba(35,199,255,.42),0 18px 55px rgba(0,0,0,.55)}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:radial-gradient(circle at 16% 0,rgba(42,197,255,.45),transparent 18%),radial-gradient(circle at 80% 4%,rgba(0,104,255,.42),transparent 18%),linear-gradient(180deg,#020816,#031a38 55%,#01040c)}
    body:before{content:"";position:fixed;inset:-20px;z-index:-1;pointer-events:none;background:linear-gradient(118deg,transparent 0 12%,rgba(72,210,255,.88) 12.3%,transparent 12.8% 40%,rgba(54,192,255,.55) 40.2%,transparent 40.9% 100%),linear-gradient(64deg,transparent 0 25%,rgba(0,119,255,.65) 25.3%,transparent 25.9% 76%,rgba(157,237,255,.72) 76.2%,transparent 76.8% 100%);filter:drop-shadow(0 0 18px #18a9ff);opacity:.82;mix-blend-mode:screen}
    .wrap{max-width:1040px;margin:0 auto;padding:22px 14px 60px}.logo{width:min(300px,74vw);display:block;margin:0 auto 10px;filter:drop-shadow(0 0 12px var(--cyan)) drop-shadow(0 0 28px var(--blue))}.title{text-align:center;margin:0 0 6px;font-size:clamp(30px,7vw,58px);line-height:.95;text-transform:uppercase;text-shadow:0 0 18px rgba(35,199,255,.9),0 5px 0 #09478a}.sub{text-align:center;color:var(--muted);font-weight:700;margin-bottom:20px}.panel{background:linear-gradient(180deg,rgba(4,32,74,.91),rgba(1,10,24,.94));border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px;position:relative;overflow:hidden}.panel:before{content:"";position:absolute;inset:0;background:linear-gradient(110deg,transparent 0 32%,rgba(255,255,255,.12) 47%,transparent 61% 100%);transform:translateX(-120%);animation:shine 5s infinite;pointer-events:none}@keyframes shine{0%,55%{transform:translateX(-120%)}78%,100%{transform:translateX(120%)}}
    form{display:grid;grid-template-columns:1fr 1fr;gap:14px;position:relative;z-index:1}label{font-weight:1000;color:#e9faff;text-shadow:0 0 9px rgba(35,199,255,.4)}.field{display:flex;flex-direction:column;gap:7px}.full{grid-column:1/-1}input,select{width:100%;border-radius:16px;border:1px solid rgba(113,223,255,.66);background:rgba(0,11,28,.8);color:var(--text);padding:13px 14px;font-size:15px;outline:none;box-shadow:inset 0 0 12px rgba(35,199,255,.12)}input:focus,select:focus{border-color:#fff;box-shadow:0 0 18px rgba(35,199,255,.55),inset 0 0 14px rgba(35,199,255,.22)}button,.btn{border:0;cursor:pointer;border-radius:999px;padding:14px 22px;font-weight:1000;font-size:16px;color:#031423;background:linear-gradient(135deg,#f4feff,#2acfff 58%,#0874ff);box-shadow:0 0 18px rgba(35,199,255,.62);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.danger{background:linear-gradient(135deg,#ffe0e7,#ff5b7a);color:#27010b}.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}.status{grid-column:1/-1;color:var(--muted);font-weight:700;min-height:22px}.status.ok{color:var(--ok)}.status.err{color:#ffc1ce}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-top:18px}.card{background:linear-gradient(180deg,rgba(7,45,100,.92),rgba(1,10,24,.95));border:1px solid rgba(81,211,255,.75);border-radius:20px;overflow:hidden;box-shadow:0 0 16px rgba(35,199,255,.34)}.card img{width:100%;height:185px;object-fit:cover;display:block;background:#e8f7ff}.card .meta{padding:10px;color:var(--muted);font-size:12px;word-break:break-all}.card b{display:block;color:#fff;font-size:14px;margin-bottom:3px}.card button{margin:0 10px 10px;width:calc(100% - 20px);padding:10px 12px;font-size:13px}@media(max-width:720px){form{grid-template-columns:1fr}.panel{padding:14px}.grid{grid-template-columns:repeat(2,1fr)}.card img{height:145px}}@media(max-width:420px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="wrap">
    <img class="logo" src="/assets/okelotre-logo.png" alt="OKELOTRE">
    <h1 class="title">ADMIN BUKTI JP</h1>
    <p class="sub">Upload gambar dari sini, lalu otomatis tampil di link utama.</p>

    <section class="panel">
      <form id="form">
        <div class="field full"><label>Password Admin</label><input id="password" name="password" type="password" placeholder="Isi ADMIN_PASSWORD dari Cloudflare" autocomplete="current-password" required></div>
        <div class="field"><label>Pilih Gambar</label><input id="file" name="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif" required></div>
        <div class="field"><label>Kategori</label><select id="category" name="category"><option value="bank">BANK</option><option value="ewallet">E-WALLET</option><option value="qris">QRIS</option></select></div>
        <div class="field"><label>Nama / Kode Member</label><input id="displayName" name="displayName" type="text" placeholder="Contoh: HEN88 / BOS12"></div>
        <div class="field"><label>Nominal JP</label><input id="amount" name="amount" type="text" placeholder="Contoh: 45000000"></div>
        <div class="full btn-row"><button type="submit">⚡ Upload Gambar</button><a class="btn" href="/" target="_blank">👁 Lihat Halaman Utama</a></div>
        <div id="status" class="status"></div>
      </form>
    </section>

    <section id="list" class="grid"></section>
  </main>
<script>
const $ = s => document.querySelector(s);
const list = $('#list');
const statusBox = $('#status');
function setStatus(text, type='') { statusBox.textContent = text; statusBox.className = 'status ' + type; }
function rupiahText(value){ const clean = String(value||'').replace(/[^0-9]/g,''); return clean ? Number(clean).toLocaleString('id-ID') : (value||''); }
async function loadList(){
  list.innerHTML = '';
  try{
    const res = await fetch('/api/list', {cache:'no-store'});
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || 'Gagal load daftar');
    for(const item of data.items || []){
      const card = document.createElement('article');
      card.className = 'card';
      const amount = rupiahText(item.amount);
      card.innerHTML = `<img src="${item.url}" alt="Bukti JP"><div class="meta"><b>${item.displayName || 'Bukti JP'} ${amount ? '• '+amount : ''}</b>${item.category || 'bank'}<br>${item.key}</div><button class="danger" data-key="${item.key}">🗑 Hapus</button>`;
      list.appendChild(card);
    }
  }catch(err){ setStatus(err.message || 'Gagal load daftar', 'err'); }
}
$('#form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const file = $('#file').files[0];
  if(!file) return setStatus('Pilih gambar dulu.', 'err');
  setStatus('Sedang upload...', '');
  const fd = new FormData();
  fd.append('password', $('#password').value);
  fd.append('file', file);
  fd.append('category', $('#category').value);
  fd.append('displayName', $('#displayName').value);
  fd.append('amount', $('#amount').value);
  try{
    const res = await fetch('/api/upload', {method:'POST', body:fd});
    const data = await res.json().catch(()=>({ok:false,error:'Response tidak valid'}));
    if(!res.ok || !data.ok) throw new Error(data.error || 'Upload gagal');
    $('#file').value='';
    setStatus('Upload berhasil bro. Gambar sudah tampil di halaman utama.', 'ok');
    await loadList();
  }catch(err){ setStatus('Gagal: ' + (err.message || 'unknown'), 'err'); }
});
list.addEventListener('click', async (e)=>{
  const btn = e.target.closest('button[data-key]');
  if(!btn) return;
  if(!$('#password').value) return setStatus('Isi password admin dulu untuk hapus.', 'err');
  if(!confirm('Yakin hapus gambar ini?')) return;
  try{
    const res = await fetch('/api/delete', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({password:$('#password').value, key:btn.dataset.key})});
    const data = await res.json().catch(()=>({ok:false,error:'Response tidak valid'}));
    if(!res.ok || !data.ok) throw new Error(data.error || 'Gagal hapus');
    setStatus('Gambar berhasil dihapus.', 'ok');
    await loadList();
  }catch(err){ setStatus('Gagal hapus: ' + (err.message || 'unknown'), 'err'); }
});
loadList();
</script>
</body>
</html>
